name: CI - Test & Validate

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
    paths:
      - '**.py'
      - '**.js'
      - '**.jsx'
      - 'requirements.txt'
      - 'frontend/package.json'
      - 'Dockerfile'
      - '.github/workflows/ci.yml'
      - '.github/actions/**'

env:
  PYTHON_VERSION: '3.11'
  NODE_VERSION: '18'

jobs:
  test-backend:
    name: 'Backend Tests (pytest)'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python environment
        uses: ./.github/actions/setup-python-env
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Create reports directory
        run: mkdir -p reports

      - name: Run pytest test suite
        env:
          DATABASE_URL: 'sqlite:///./test_temp.db'
          OPENAI_API_KEY: 'sk-test-not-real-ci-key'
          CORS_ORIGINS: 'http://localhost:3000'
        run: |
          {
            echo "=== Resume Generator - Backend Test Run ==="
            echo "Date     : $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
            echo "Python   : $(python --version)"
            echo "Branch   : ${{ github.ref_name }}"
            echo "Commit   : ${{ github.sha }}"
            echo "==========================================="
            echo ""
          } > reports/backend-test.log
          pytest tests/ -v \
            --junitxml=reports/backend-junit.xml \
            --tb=short \
            -p no:cacheprovider \
            2>&1 | tee -a reports/backend-test.log
          EXIT_CODE=${PIPESTATUS[0]}
          echo "=== Run complete - exit code: $EXIT_CODE ===" >> reports/backend-test.log
          rm -f test_temp.db 2>/dev/null || true
          exit $EXIT_CODE

      - name: Upload backend test artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-tests-${{ github.run_id }}-attempt${{ github.run_attempt }}
          path: reports/
          retention-days: 30

  test-frontend:
    name: 'Frontend Tests (Jest)'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node environment
        uses: ./.github/actions/setup-node-env
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Create reports directory
        run: mkdir -p reports

      - name: Run Jest test suite
        env:
          CI: 'true'
          REACT_APP_API_URL: 'http://localhost:8000'
        working-directory: frontend
        run: |
          {
            echo "=== Resume Generator - Frontend Test Run ==="
            echo "Date   : $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
            echo "Node   : $(node --version)"
            echo "Branch : ${{ github.ref_name }}"
            echo "Commit : ${{ github.sha }}"
            echo "==========================================="
            echo ""
          } > ../reports/frontend-test.log
          npm test -- \
            --watchAll=false \
            --forceExit \
            --json \
            --outputFile=../reports/frontend-jest.json \
            2>&1 | tee -a ../reports/frontend-test.log
          EXIT_CODE=${PIPESTATUS[0]}
          echo "=== Run complete - exit code: $EXIT_CODE ===" >> ../reports/frontend-test.log
          exit $EXIT_CODE

      - name: Upload frontend test artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: frontend-tests-${{ github.run_id }}-attempt${{ github.run_attempt }}
          path: reports/
          retention-days: 30

  validate-docker:
    name: 'Validate Docker Build'
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build \
            --platform linux/amd64 \
            --tag "resume-generator:ci-${{ github.sha }}" \
            --label "git.sha=${{ github.sha }}" \
            .
          echo "Image built successfully"

      - name: Verify container health
        run: |
          docker run --detach --name ci-health-test \
            --publish 8001:8000 \
            --env OPENAI_API_KEY=sk-test \
            --env DATABASE_URL=sqlite:///./test.db \
            --env CORS_ORIGINS=http://localhost:3000 \
            "resume-generator:ci-${{ github.sha }}"
          sleep 8
          HTTP_STATUS=$(curl --silent --max-time 10 \
            --write-out "%{http_code}" --output /dev/null \
            http://localhost:8001/health)
          docker stop ci-health-test && docker rm ci-health-test
          [ "$HTTP_STATUS" = "200" ] && echo "Health check passed" || (echo "Health check failed - HTTP $HTTP_STATUS" && exit 1)

  ci-summary:
    name: 'CI Summary Report'
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend, validate-docker]
    if: always()
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all test artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: '*-tests-${{ github.run_id }}-*'
          merge-multiple: true
          path: all-reports/
        continue-on-error: true

      - name: Build summary report
        run: |
          mkdir -p summary
          cat > summary/ci-summary.md << REPORT
          # CI Summary - Run #${{ github.run_id }}
          | Field | Value |
          |---|---|
          | Commit | \`${{ github.sha }}\` |
          | Branch | \`${{ github.ref_name }}\` |
          | Triggered by | ${{ github.actor }} |
          | Date | $(date -u '+%Y-%m-%d %H:%M:%S UTC') |

          ## Job Results
          | Job | Result |
          |---|---|
          | Backend Tests | ${{ needs.test-backend.result }} |
          | Frontend Tests | ${{ needs.test-frontend.result }} |
          | Docker Validate | ${{ needs.validate-docker.result }} |
          REPORT

      - name: Export CI workflow as artifact
        uses: actions/upload-artifact@v4
        with:
          name: workflow-definition-ci-${{ github.run_id }}
          path: .github/workflows/ci.yml
          retention-days: 90
        continue-on-error: true

      - name: Upload CI summary
        uses: actions/upload-artifact@v4
        with:
          name: ci-summary-${{ github.run_id }}
          path: summary/
          retention-days: 90

      - name: Post to step summary
        if: always()
        run: cat summary/ci-summary.md >> $GITHUB_STEP_SUMMARY
